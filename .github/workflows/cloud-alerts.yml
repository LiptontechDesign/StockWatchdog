name: Free Cloud Alerts

on:
  workflow_dispatch: {}
  schedule:
    # Covers normal US market hours across daylight-saving changes.
    - cron: "*/15 12-22 * * 1-5"
    # Low-frequency catch-up for earnings reminders and missed runs.
    - cron: "0 6,18 * * *"

permissions:
  contents: read

concurrency:
  group: free-cloud-alerts
  cancel-in-progress: true

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cloud-alerts/package-lock.json

      - name: Install alert runner
        working-directory: cloud-alerts
        run: npm ci

      - name: Check alert rules and send FCM
        working-directory: cloud-alerts
        env:
          FIREBASE_PROJECT_ID: stockwatchdog-41541
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: node check-alerts.js
