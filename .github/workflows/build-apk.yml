name: Build APK

on:
  # Creating a tag like v1.0.0 also produces a GitHub Release with the APK attached.
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Restore signing keystore
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_SIGNING_KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > keystore/stockwatchdog-upload.p12
          fi

      # Optional: if you ever set these as GitHub Secrets, the built APK will
      # ship with the keys baked in. If you don't set them, the app will
      # simply prompt you to enter them in Settings on first launch.
      - name: Write local.properties
        run: |
          echo "TWELVE_DATA_API_KEY=${{ secrets.TWELVE_DATA_API_KEY }}" >> local.properties
          echo "ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}" >> local.properties
          echo "FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}" >> local.properties
          echo "APP_VERSION_CODE=${{ github.run_number }}" >> local.properties
          echo "ANDROID_SIGNING_STORE_FILE=keystore/stockwatchdog-upload.p12" >> local.properties
          echo "ANDROID_SIGNING_STORE_TYPE=PKCS12" >> local.properties
          echo "ANDROID_SIGNING_STORE_PASSWORD=${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}" >> local.properties
          echo "ANDROID_SIGNING_KEY_ALIAS=${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}" >> local.properties
          echo "ANDROID_SIGNING_KEY_PASSWORD=${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}" >> local.properties

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-watchdog-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Attach APK to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
